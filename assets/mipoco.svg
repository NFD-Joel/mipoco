<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#252c40"/>
      <stop offset="1" stop-color="#141826"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34e0e0"/>
      <stop offset="1" stop-color="#1fb6c9"/>
    </linearGradient>
  </defs>

  <!-- window body -->
  <rect x="40" y="56" width="432" height="400" rx="60" fill="url(#body)" stroke="#0a0d15" stroke-width="6"/>

  <!-- title / tab bar -->
  <path d="M40 116 a60 60 0 0 1 60 -60 h312 a60 60 0 0 1 60 60 v28 h-432 z" fill="#2c3450"/>
  <!-- tab pills: one active (cyan) + two inactive -->
  <rect x="84"  y="84" width="104" height="30" rx="15" fill="url(#cyan)"/>
  <rect x="204" y="84" width="84"  height="30" rx="15" fill="#4a5474"/>
  <rect x="304" y="84" width="84"  height="30" rx="15" fill="#4a5474"/>

  <!-- split divider between the two panes -->
  <line x1="300" y1="156" x2="300" y2="448" stroke="#3a4360" stroke-width="6"/>

  <!-- left pane: prompt chevron + cursor block -->
  <path d="M96 224 L156 272 L96 320" fill="none" stroke="url(#cyan)" stroke-width="30"
        stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="184" y="294" width="68" height="30" rx="7" fill="#fbcd4c"/>

  <!-- right pane: another session's output (text lines) -->
  <rect x="332" y="206" width="104" height="16" rx="8" fill="#5d688a"/>
  <rect x="332" y="248" width="84"  height="16" rx="8" fill="#48506e"/>
  <rect x="332" y="290" width="100" height="16" rx="8" fill="#48506e"/>
  <rect x="332" y="332" width="72"  height="16" rx="8" fill="#48506e"/>
  <rect x="332" y="374" width="92"  height="16" rx="8" fill="#48506e"/>
</svg>
