# mipoco configuration — copy to:
#   Linux:   ~/.config/mipoco/config.toml
#   Windows: %APPDATA%\mipoco\config.toml
# Every key is optional; this file shows the defaults.

# Shell for new panes. Default: $SHELL on Linux, powershell.exe on Windows.
#default_shell = "/bin/zsh"

# Set true by the first-run setup wizard. While false, the wizard runs at
# startup (claude command, explorer folders, shell, display). Set false to
# re-run it, or trigger it any time from the settings overlay (Alt+o).
setup_complete = false

# Folders the explorer is allowed to browse. This is also its upper boundary —
# the explorer can never navigate above these. A leading ~ is expanded.
# One root shows its contents; several roots appear as top-level entries.
#explorer_roots = ["~/projects", "/mnt/prox-share"]

# Check GitHub for a newer release on startup (via curl; silent if offline).
# When one exists, Alt+u opens an upgrade / changelog overlay.
check_updates = true

# Desktop notification when a Claude pane asks for permission or finishes its
# turn. Clicking it brings mipoco forward and jumps to that exact tab + pane.
# Enabling installs Notification/Stop hooks into ~/.claude/settings.json (a
# no-op whenever Claude runs outside mipoco); a tab dot (●) marks panes that
# need you. Toggle live from settings (Alt+o).
notifications = true

# Open the file explorer panel at startup.
show_explorer_on_start = false

# Command run by the c/C and Alt+c ("claude session here") actions.
# Bypass mode (b/B, Alt+b) appends --dangerously-skip-permissions to this.
# On Linux this runs through `$SHELL -ic` so claude is found on your shell's
# PATH (e.g. ~/.npm-global/bin) even when mipoco starts from a desktop icon.
claude_command = "claude"

# How text/markdown files open (v in the explorer, or any view_with_pager
# extension): "builtin" = mipoco's own reader (word-wrapped, margins, comfortable
# spacing); "external" = a pager in a pane.
viewer = "builtin"

# External pager, used only when viewer = "external". mipoco auto-picks a nicer
# tool when installed — "glow -p" for markdown, "bat" for code/text — and falls
# back to this otherwise.
pager = "less -R"

# Scrollback lines kept per pane (bounded; primary screen only).
scrollback = 5000

# Width of the file explorer panel in columns.
explorer_width = 32

# Close panes immediately when their child exits instead of showing [exited].
auto_close_exited = false

# Extensions always handed to the OS default opener (browser, viewer, ...).
# NOTE: must stay above the [runners] table — it is a top-level key.
#open_with_system = ["html", "htm", "pdf", "png", "jpg", "jpeg", "gif", "svg", "webp", "mp4", "mp3", "webm", "odt", "docx", "xlsx"]

# Extensions opened in the pager (scrollable viewer) inside a pane.
# NOTE: must stay above the [runners] table — it is a top-level key.
#view_with_pager = ["md", "markdown", "txt", "log", "json", "toml", "yaml", "rs", "py"]

# Runners for "execute file in a pane", keyed by extension.
# Entries here extend/override the built-in table
# (py, js, mjs, ts, sh, rb, pl, php, lua on Linux; py, js, ts, ps1, bat on Windows).
[runners]
py = "python3"
#go = "go run"
